name: Publish to Open VSX

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

jobs:
  publish:
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Cache dependencies
        uses: actions/cache@v4
        id: yarn-cache
        with:
          path: |
            node_modules
            /home/runner/.cache/yarn/v6
          key: ${{ runner.os }}-yarn-${{ hashFiles('yarn.lock') }}
          restore-keys: |
            ${{ runner.os }}-yarn-

      - name: Install dependencies
        if: steps.yarn-cache.outputs.cache-hit != 'true'
        run: yarn install --frozen-lockfile

      - name: Run tests
        run: yarn test

      - name: Package extension
        run: npx @vscode/vsce package --no-yarn

      - name: Find VSIX file
        id: find-vsix
        run: |
          VSIX_FILE=$(ls -t comtext-lint-*.vsix | head -1)
          echo "file=$VSIX_FILE" >> $GITHUB_OUTPUT
          echo "Found VSIX file: $VSIX_FILE"

      - name: Create GitHub Release and upload VSIX
        if: github.event_name == 'push'
        uses: softprops/action-gh-release@v2
        with:
          files: ${{ steps.find-vsix.outputs.file }}
          generate_release_notes: true

      - name: Create namespace (if not exists)
        run: |
          npx ovsx create-namespace comtext --pat ${{ secrets.OVSX_PAT }} || true
        continue-on-error: true

      - name: Publish to Open VSX
        uses: HaaLeo/publish-vscode-extension@v1
        with:
          pat: ${{ secrets.OVSX_PAT }}
          extensionFile: ${{ steps.find-vsix.outputs.file }}
          registryUrl: 'https://open-vsx.org'
